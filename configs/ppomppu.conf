<VirtualHost *:80>
    ServerName www.ppomppu.co.kr
    DocumentRoot "/home/webadmin/ppomppu"
    DirectoryIndex index.html index.php

    <Directory "/home/webadmin/ppomppu">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Custom log with cronolog (simplified for Docker)
    ErrorLog "/home/logs/apache/error/error_log"
    CustomLog "/home/logs/apache/access/access_log" combined

    # PHP support
    AddType application/x-httpd-php .php .htm .html .inc
    AddType application/x-httpd-php-source .phps

    # mpm_worker optimization (can be in global)
</VirtualHost>

# MPM Worker settings
<IfModule mpm_worker_module>
    ServerLimit 80
    StartServers 20
    MaxRequestWorkers 2000
    MinSpareThreads 25
    MaxSpareThreads 75
    ThreadsPerChild 25
</IfModule>
